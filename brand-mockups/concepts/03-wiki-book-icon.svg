    <rect x="110" y="325" width="90"  height="6" rx="3"/>
    <rect x="282" y="180" width="120" height="6" rx="3"/>
    <rect x="282" y="205" width="100" height="6" rx="3"/>
    <rect x="282" y="230" width="130" height="6" rx="3"/>

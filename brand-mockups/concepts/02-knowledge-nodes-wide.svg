    <circle cx="128" cy="128" r="28" fill="url(#nG)"/>
    <circle cx="384" cy="128" r="28" fill="url(#nG)"/>
    <circle cx="128" cy="384" r="28" fill="url(#nG)"/>
    <circle cx="384" cy="384" r="28" fill="url(#nG)"/>
    <circle cx="96"  cy="256" r="24" fill="url(#nG)"/>
    <circle cx="416" cy="256" r="24" fill="url(#nG)"/>

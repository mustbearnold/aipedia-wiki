      <line x1="256" y1="256" x2="384" y2="128"/>
      <line x1="256" y1="256" x2="128" y2="384"/>
      <line x1="256" y1="256" x2="384" y2="384"/>
      <line x1="256" y1="256" x2="96"  y2="256"/>

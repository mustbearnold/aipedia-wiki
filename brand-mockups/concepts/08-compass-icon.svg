<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="needleN" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="needleS" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <!-- outer ring -->
  <circle cx="256" cy="256" r="200"
          fill="none" stroke="url(#ringG)" stroke-width="6"/>
  <!-- inner ring -->
  <circle cx="256" cy="256" r="176"
          fill="none" stroke="url(#ringG)" stroke-width="2" stroke-opacity="0.7"/>
  <!-- cardinal tick marks -->
  <g stroke="url(#ringG)" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="62"  x2="256" y2="90"/>
    <line x1="450" y1="256" x2="422" y2="256"/>
    <line x1="256" y1="450" x2="256" y2="422"/>
    <line x1="62"  y1="256" x2="90"  y2="256"/>
  </g>
  <!-- needle south (dim triangle) -->
  <polygon points="256,256 236,256 256,410 276,256" fill="url(#needleS)"/>
  <!-- needle north (bright triangle) -->
  <polygon points="256,256 236,256 256,102 276,256" fill="url(#needleN)"/>
  <!-- centre hub -->
  <circle cx="256" cy="256" r="18" fill="url(#needleN)"/>
  <circle cx="256" cy="256" r="8" fill="url(#needleN)" opacity="0.6"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square frame -->
  <rect x="40" y="40" width="432" height="432" rx="96" ry="96"
        fill="none" stroke="url(#mgGrad)" stroke-width="16"/>
  <!-- lowercase "a" (left) -->
  <text x="138" y="352" font-family="Arial Black, Arial, sans-serif"
        font-size="280" font-weight="900" fill="url(#mgGrad)"
        text-anchor="middle">a</text>
  <!-- gradient dot between -->
  <circle cx="256" cy="338" r="18" fill="url(#mgGrad)"/>
  <!-- lowercase "w" (right) -->
  <text x="374" y="352" font-family="Arial Black, Arial, sans-serif"
        font-size="220" font-weight="900" fill="url(#mgGrad)"
        text-anchor="middle">w</text>
</svg>

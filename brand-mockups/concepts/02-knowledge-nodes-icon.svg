<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- connection lines (drawn first, behind nodes) -->
  <g stroke="url(#lineGrad)" stroke-width="4" fill="none">
    <line x1="256" y1="256" x2="128" y2="128"/>
    <line x1="256" y1="256" x2="384" y2="128"/>
    <line x1="256" y1="256" x2="128" y2="384"/>
    <line x1="256" y1="256" x2="384" y2="384"/>
    <line x1="256" y1="256" x2="96"  y2="256"/>
    <line x1="256" y1="256" x2="416" y2="256"/>
  </g>
  <!-- satellite nodes -->
  <circle cx="128" cy="128" r="28" fill="url(#nodeGrad)"/>
  <circle cx="384" cy="128" r="28" fill="url(#nodeGrad)"/>
  <circle cx="128" cy="384" r="28" fill="url(#nodeGrad)"/>
  <circle cx="384" cy="384" r="28" fill="url(#nodeGrad)"/>
  <circle cx="96"  cy="256" r="24" fill="url(#nodeGrad)"/>
  <circle cx="416" cy="256" r="24" fill="url(#nodeGrad)"/>
  <!-- central hub -->
  <circle cx="256" cy="256" r="56" fill="url(#nodeGrad)"/>
  <circle cx="256" cy="256" r="20" fill="#ffffff" opacity="0.4"/>
</svg>

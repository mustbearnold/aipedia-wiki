name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Script tests and command surface
        run: npm run test:scripts && npm run audit:commands

      - name: Guards and audits
        run: npm run check

      - name: Fast build
        run: npm run build:fast

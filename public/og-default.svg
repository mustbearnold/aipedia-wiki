<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">aipedia.wiki Signal Cyan social card</title>
  <desc id="desc">Signal Cyan aipedia.wiki brand card with crystal mark and editorial AI tools encyclopedia copy.</desc>
  <defs>
    <radialGradient id="glow" cx="32%" cy="48%" r="46%">
      <stop offset="0%" stop-color="#36f6ff" stop-opacity="0.32"/>
      <stop offset="48%" stop-color="#08c7df" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#061019" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76f7ff"/>
      <stop offset="52%" stop-color="#20d8ef"/>
      <stop offset="100%" stop-color="#079ab7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
